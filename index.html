<!DOCTYPE html>
<html lang="si" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>To Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --teal:#2a7a72;--teal-l:#3a9e94;--teal-d:#1d5e58;--teal-bg:#e8f5f4;
  --high:#e74c3c;--high-bg:#fdf0ef;--med:#e67e22;--med-bg:#fef5ec;
  --low:#27ae60;--low-bg:#eafaf1;
  --txt:#1a2e2c;--muted:#7a9490;--bdr:#d0e8e5;--bg:#f5fafa;--card:#fff;
  --shad:0 2px 12px rgba(42,122,114,.09);--rhov:#f8fbfb;--rbdr:#f0f6f5;
  --dh-bg:#eafaf6;--dh-c:#1a7a50;
  --mv-bg:#eef6ff;--mv-b:#bdd7f8;--mv-c:#2563a8;
  --mo-ov:rgba(0,0,0,.45);--mo-bg:#fff;
}
[data-theme="dark"]{
  --teal:#3ab8ad;--teal-l:#4dd0c4;--teal-d:#2a9089;--teal-bg:#0e2e2c;
  --high:#f17066;--high-bg:#2d1a19;--med:#f0963a;--med-bg:#2a1d0e;
  --low:#4ecb78;--low-bg:#0d2318;
  --txt:#e2f0ee;--muted:#6a9490;--bdr:#1e4a46;--bg:#0d1f1e;--card:#132422;
  --shad:0 2px 16px rgba(0,0,0,.4);--rhov:#1a3230;--rbdr:#1a3230;
  --dh-bg:#0d2318;--dh-c:#4ecb78;
  --mv-bg:#0e1e35;--mv-b:#1e3a6a;--mv-c:#7ab4f8;
  --mo-ov:rgba(0,0,0,.72);--mo-bg:#132422;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins','Noto Sans Sinhala',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s;}

.app-header{background:linear-gradient(135deg,var(--teal-d) 0%,var(--teal) 60%,var(--teal-l) 100%);color:#fff;padding:18px 32px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.app-header h1{font-size:28px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:10px;}
.header-right{display:flex;gap:8px;align-items:center;}
.btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.6);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .18s;}
.btn-outline:hover{background:rgba(255,255,255,.18);}
.theme-btn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.theme-btn:hover{background:rgba(255,255,255,.3);}
/* sync indicator */
.sync-dot{width:10px;height:10px;border-radius:50%;background:#4ecb78;transition:background .3s;flex-shrink:0;}
.sync-dot.syncing{background:#f0963a;animation:pulse .7s infinite alternate;}
.sync-dot.err{background:#f17066;}
@keyframes pulse{from{opacity:.5}to{opacity:1}}

.month-strip{background:var(--teal-d);padding:7px 32px 9px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
.month-strip::-webkit-scrollbar{display:none;}
.month-label{color:rgba(255,255,255,.75);font-size:12px;font-weight:600;white-space:nowrap;margin-right:4px;}
.month-nav{background:rgba(255,255,255,.15);color:#fff;border:none;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.month-nav:hover{background:rgba(255,255,255,.3);}
.day-btn{min-width:34px;height:34px;border-radius:7px;border:none;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.day-btn:hover{background:rgba(255,255,255,.25);}
.day-btn.selected{background:#fff;color:var(--teal-d);}
.day-btn.today{outline:2px solid rgba(255,255,255,.6);}
.day-btn.has-tasks::after{content:'•';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:9px;color:#a8e6e0;}

.main{padding:18px 32px;max-width:1100px;margin:0 auto;}
.date-title{font-size:18px;font-weight:700;color:var(--teal);margin-bottom:3px;}
.date-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.moved-notice{background:var(--mv-bg);border:1px solid var(--mv-b);border-radius:9px;padding:8px 14px;font-size:12px;color:var(--mv-c);margin-bottom:12px;display:none;}

.add-task-card{background:var(--card);border-radius:12px;border:1.5px dashed var(--bdr);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shad);transition:background .25s;}
.add-task-card h3{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:10px;}
.add-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
.ff{padding:7px 11px;border:1.5px solid var(--bdr);border-radius:7px;font-family:inherit;font-size:12px;color:var(--txt);background:var(--bg);outline:none;transition:border .15s,background .25s,color .25s;}
.ff:focus{border-color:var(--teal);}
.f-task{flex:2;min-width:160px;}
.f-sel{flex:1;min-width:100px;}
.f-time{width:62px;}
.f-ampm{width:70px;}
.f-dur{width:68px;}
.second-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.f-notes{flex:1;min-width:150px;}
.everyday-wrap{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.everyday-wrap label{font-size:12px;color:var(--muted);cursor:pointer;user-select:none;}
.toggle-cb{appearance:none;width:34px;height:19px;background:var(--bdr);border-radius:999px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle-cb:checked{background:var(--teal);}
.toggle-cb::after{content:'';position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-cb:checked::after{left:18px;}
.btn-teal{background:var(--teal);color:#fff;padding:7px 16px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-teal:hover{background:var(--teal-l);}

.section{margin-bottom:16px;}
.section-header{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;margin-bottom:8px;font-weight:700;font-size:13px;}
.section-done .section-header{background:var(--dh-bg);color:var(--dh-c);border-left:4px solid var(--low);}
.count-badge{margin-left:auto;background:rgba(0,0,0,.09);border-radius:999px;padding:1px 9px;font-size:11px;}
[data-theme="dark"] .count-badge{background:rgba(255,255,255,.10);}
.num-cell{color:var(--muted);font-size:11px;font-weight:600;text-align:right;padding-right:6px;white-space:nowrap;}

.task-table{width:100%;border-collapse:collapse;}
.task-table th{text-align:left;padding:4px 9px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr);border-right:1px solid var(--bdr);}
.task-table th:last-child{border-right:none;}
.task-table td{padding:3px 9px;font-size:12px;border-bottom:1px solid var(--rbdr);border-right:1px solid var(--rbdr);vertical-align:middle;line-height:1.25;}
.task-table td:last-child{border-right:none;}
.task-table tr:last-child td{border-bottom:none;}
.task-table tbody tr:hover td{background:var(--rhov);}
.task-table tr.done-row td{opacity:.5;}
.task-table tr.done-row .t-name{text-decoration:line-through;color:var(--muted);}

.print-date-bar{display:none;}
@media print{
  .print-date-bar{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0 8px;border-bottom:1.5px solid #2a7a72;margin-bottom:10px;}
  .print-date-bar .pd-title{font-size:18px;font-weight:800;color:#2a7a72;}
  .print-date-bar .pd-date{font-size:13px;color:#444;font-weight:600;}
}

.pri-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
.pri-high{background:var(--high-bg);color:var(--high);border:1px solid #f5b7b1;}
.pri-med {background:var(--med-bg); color:var(--med); border:1px solid #f8c68c;}
.pri-low {background:var(--low-bg); color:var(--low); border:1px solid #a9dfbf;}
[data-theme="dark"] .pri-high{border-color:#6a2a24;}
[data-theme="dark"] .pri-med {border-color:#6a3a10;}
[data-theme="dark"] .pri-low {border-color:#1a4a28;}

.status-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-todo{background:#fff3e0;color:#b35c00;border:1px solid #f8c68c;}
.badge-done{background:#eafaf1;color:#1a7a50;border:1px solid #a9dfbf;}
[data-theme="dark"] .badge-todo{background:#2a1d0e;color:#f0963a;border-color:#5a3810;}
[data-theme="dark"] .badge-done{background:#0d2318;color:#4ecb78;border-color:#1a4a28;}

.time-range{font-size:11px;font-weight:600;color:var(--teal);white-space:nowrap;}
.moved-tag{font-size:9px;background:var(--mv-bg);color:var(--mv-c);border-radius:3px;padding:1px 5px;margin-left:4px;border:1px solid var(--mv-b);}

.action-btns{display:flex;gap:3px;}
.action-btn{width:24px;height:24px;border:none;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .13s;font-weight:700;}
.btn-complete {background:#eafaf1;color:#27ae60;}
.btn-complete:hover{background:#d4f0e3;}
.btn-undo{background:#fff3e0;color:#b35c00;font-size:12px;}
.btn-undo:hover{background:#ffe5bb;}
.btn-move-next{background:#eef0f7;color:#4a5568;font-size:14px;}
.btn-move-next:hover{background:#dde2f0;}
.btn-delete{background:#fdf0ef;color:#e74c3c;}
.btn-delete:hover{background:#fce4e1;}
[data-theme="dark"] .btn-complete{background:#0d2318;color:#4ecb78;}
[data-theme="dark"] .btn-undo{background:#2a1d0e;color:#f0963a;}
[data-theme="dark"] .btn-move-next{background:#1a2535;color:#90aac8;}
[data-theme="dark"] .btn-delete{background:#2d1a19;color:#f17066;}

.empty-msg{text-align:center;padding:12px;color:var(--muted);font-size:12px;}

.modal-overlay{display:none;position:fixed;inset:0;background:var(--mo-ov);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--mo-bg);border:1px solid var(--bdr);border-radius:14px;padding:26px 30px;max-width:340px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3);text-align:center;}
.modal-icon{font-size:32px;margin-bottom:8px;}
.modal-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:5px;}
.modal-msg{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.modal-task-name{font-size:13px;font-weight:600;color:var(--high);background:var(--high-bg);border-radius:7px;padding:7px 12px;margin-bottom:18px;word-break:break-word;}
.modal-btns{display:flex;gap:9px;justify-content:center;}
.modal-btn-cancel{padding:8px 20px;border-radius:7px;border:1.5px solid var(--bdr);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.modal-btn-cancel:hover{background:var(--rhov);}
.modal-btn-confirm{padding:8px 20px;border-radius:7px;border:none;background:var(--high);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.modal-btn-confirm:hover{background:#c0392b;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;padding:9px 20px;border-radius:22px;font-size:12px;font-weight:600;z-index:2000;box-shadow:0 4px 18px rgba(0,0,0,.2);transition:opacity .4s;pointer-events:none;opacity:0;max-width:90%;text-align:center;}

@media print{
  body{background:#fff!important;font-size:10px;color:#000!important;}
  .no-print{display:none!important;}
  .app-header,.month-strip,.add-task-card,.moved-notice,.modal-overlay{display:none!important;}
  .main{padding:4px 10px;max-width:100%;}
  .action-btns{display:none;}
  .task-table th,.task-table td{padding:4px 7px;font-size:10px;border-color:#ccc;}
  .section-header{padding:6px 10px;font-size:12px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pri-badge,.status-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .date-title,.date-sub{display:none;}
  @page{size:A4;margin:8mm 10mm;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- Delete Modal -->
<div class="modal-overlay no-print" id="delete-modal">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">කාර්යය මකන්නද?</div>
    <div class="modal-msg">පහත කාර්යය ස්ථිරවම මකා දැමේ.<br>මෙය නැවත ලබාගත නොහැක.</div>
    <div class="modal-task-name" id="modal-task-name"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">අවලංගු කරන්න</button>
      <button class="modal-btn-confirm" onclick="confirmDelete()">ඔව්, මකන්න</button>
    </div>
  </div>
</div>

<div class="app-header">
  <h1>📋 To Do List</h1>
  <div class="header-right no-print">
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    <button class="btn-outline" onclick="doPrint()">🖨️ Print A4</button>
  </div>
</div>

<div class="month-strip no-print">
  <button class="month-nav" onclick="prevMonth()">‹</button>
  <span class="month-label" id="month-label"></span>
  <div id="day-strip" style="display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;"></div>
  <button class="month-nav" onclick="nextMonth()">›</button>
</div>

<div class="main">
  <div class="date-title" id="date-title"></div>
  <div class="date-sub" id="date-sub"></div>
  <div class="moved-notice no-print" id="moved-notice"></div>
  <div class="print-date-bar">
    <span class="pd-title">📋 To Do List</span>
    <span class="pd-date" id="print-date-label"></span>
  </div>

  <div class="add-task-card no-print">
    <h3>➕ නව කාර්යයක් එකතු කරන්න</h3>
    <div class="add-row">
      <input class="ff f-task" type="text" id="task-name" placeholder="කාර්යය ලියන්න..."/>
      <select class="ff f-sel" id="task-priority">
        <option value="high">🔥 High</option>
        <option value="medium" selected>📌 Medium</option>
        <option value="low">🧘 Low</option>
      </select>
      <input class="ff f-time" type="number" id="task-hour" min="1" max="12" placeholder="HH"/>
      <input class="ff f-time" type="number" id="task-min"  min="0" max="59" placeholder="MM"/>
      <select class="ff f-ampm" id="task-ampm">
        <option value="AM">AM</option>
        <option value="PM">PM</option>
      </select>
      <input class="ff f-dur" type="number" id="task-dur-h" min="0" max="23" placeholder="+ පැය"/>
      <input class="ff f-dur" type="number" id="task-dur-m" min="0" max="59" placeholder="+ මිනි"/>
    </div>
    <div class="second-row">
      <input class="ff f-notes" type="text" id="task-notes" placeholder="Notes (optional)..."/>
      <div class="everyday-wrap">
        <input type="checkbox" class="toggle-cb" id="task-everyday"/>
        <label for="task-everyday">හැම දවසටම</label>
      </div>
      <button class="btn-teal" onclick="addTask()">+ එකතු කරන්න</button>
    </div>
  </div>

  <div class="section section-all" id="sec-all">
    <table class="task-table">
      <thead><tr><th style="width:26px">#</th><th>කාර්යය</th><th>Priority</th><th>වෙලාව</th><th>Status</th><th>Notes</th><th class="no-print">Action</th></tr></thead>
      <tbody id="all-body"></tbody>
    </table>
  </div>

  <div class="section section-done" id="done-section" style="display:none;">
    <div class="section-header">✅ සම්පූර්ණ කළ කාර්යයන් (Completed)<span class="count-badge" id="done-count">0</span></div>
    <table class="task-table">
      <thead><tr><th style="width:26px">#</th><th>කාර්යය</th><th>Priority</th><th>වෙලාව</th><th>Status</th><th>Notes</th><th class="no-print">Action</th></tr></thead>
      <tbody id="done-body"></tbody>
    </table>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────
const SB_URL = 'https://ggacvzomxgajlkrrktox.supabase.co';
const SB_KEY = 'sb_publishable_gV3eWGcsbBF5yCgY0f_H7Q_zcGtXP-s';
const SB_TABLE = 'todo_tasks';

async function sbFetch(path, opts={}){
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')&&res.status!==204?res.json():null;
}

function syncDot(state){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(state==='syncing'?' syncing':state==='err'?' err':'');
  d.title=state==='syncing'?'Syncing...':state==='err'?'Sync error':'Synced ✓';
}

// ── LOCAL CONSTANTS ──────────────────────────────────────────
const MONTHS_SI=['ජනවාරි','පෙබරවාරි','මාර්තු','අප්‍රේල්','මැයි','ජූනි','ජූලි','අගෝස්තු','සැප්තැම්බර්','ඔක්තෝබර්','නොවැම්බර්','දෙසැම්බර්'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SI=['ඉරිදා','සඳුදා','අඟහරුවාදා','බදාදා','බ්‍රහස්පතින්දා','සිකුරාදා','සෙනසුරාදා'];

let today=new Date();today.setHours(0,0,0,0);
let viewMonth=today.getMonth(),viewYear=today.getFullYear();
let selectedDate=dateKey(today);
// local cache: { dateKey: [task,...] }
let cache={};
let everydayTasks=JSON.parse(localStorage.getItem('todo_everyday')||'[]');
let pendingDeleteId=null,pendingDeleteEveryday=false;

let theme=localStorage.getItem('todo_theme')||'light';
applyTheme(theme);
function applyTheme(t){theme=t;document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('todo_theme',t);}
function toggleTheme(){applyTheme(theme==='light'?'dark':'light');}

function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ── SUPABASE CRUD ─────────────────────────────────────────────
async function sbLoadDate(dateStr){
  try{
    syncDot('syncing');
    const rows=await sbFetch(SB_TABLE+'?date_key=eq.'+dateStr+'&order=created_at.asc');
    cache[dateStr]=(rows||[]).map(r=>({...r.task_data,id:r.task_id,_rowid:r.id}));
    syncDot('ok');
  }catch(e){console.warn('load err',e);syncDot('err');}
}

async function sbUpsertTask(task,dateStr){
  try{
    syncDot('syncing');
    const payload={task_id:task.id,date_key:dateStr,task_data:task};
    // check if exists
    const existing=await sbFetch(SB_TABLE+'?task_id=eq.'+encodeURIComponent(task.id));
    if(existing&&existing.length>0){
      await sbFetch(SB_TABLE+'?task_id=eq.'+encodeURIComponent(task.id),{method:'PATCH',body:JSON.stringify({task_data:task})});
    } else {
      await sbFetch(SB_TABLE,{method:'POST',body:JSON.stringify(payload)});
    }
    syncDot('ok');
  }catch(e){console.warn('upsert err',e);syncDot('err');}
}

async function sbDeleteTask(taskId){
  try{
    syncDot('syncing');
    await sbFetch(SB_TABLE+'?task_id=eq.'+encodeURIComponent(taskId),{method:'DELETE'});
    syncDot('ok');
  }catch(e){console.warn('delete err',e);syncDot('err');}
}

// ── LOCAL CACHE HELPERS ───────────────────────────────────────
function getCacheTasks(dateStr){return cache[dateStr]||[];}
function setCacheTasks(dateStr,tasks){cache[dateStr]=tasks;}
function saveEveryday(){localStorage.setItem('todo_everyday',JSON.stringify(everydayTasks));}

// ── MONTH STRIP ───────────────────────────────────────────────
function prevMonth(){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderStrip();}
function nextMonth(){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderStrip();}

function renderStrip(){
  document.getElementById('month-label').textContent=MONTHS_EN[viewMonth]+' '+viewYear;
  const strip=document.getElementById('day-strip');
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  strip.innerHTML='';
  for(let d=1;d<=days;d++){
    const dt=new Date(viewYear,viewMonth,d),key=dateKey(dt);
    const btn=document.createElement('button');btn.className='day-btn';
    if(key===dateKey(today))btn.classList.add('today');
    if(key===selectedDate)btn.classList.add('selected');
    const tasks=getCacheTasks(key);
    if(tasks.length||everydayTasks.length)btn.classList.add('has-tasks');
    btn.textContent=d;
    btn.onclick=()=>selectDate(key);
    strip.appendChild(btn);
  }
}

async function selectDate(key){
  selectedDate=key;
  renderStrip();
  await sbLoadDate(key);
  renderPage();
}

// ── TIME UTILS ────────────────────────────────────────────────
function timeToMinutes(tH,tM,ampm){
  let h=parseInt(tH)||0,m=parseInt(tM)||0;
  if(!h&&!m&&!tH)return 9999;
  if(ampm==='AM'){if(h===12)h=0;}else{if(h!==12)h+=12;}
  return h*60+m;
}
function addDur(h,m,ampm,dh,dm){
  h=parseInt(h)||0;m=parseInt(m)||0;dh=parseInt(dh)||0;dm=parseInt(dm)||0;
  let h24=h;
  if(ampm==='AM'){if(h===12)h24=0;}else{if(h!==12)h24=h+12;}
  let total=h24*60+m+dh*60+dm;total=total%1440;
  let eh=Math.floor(total/60),em=total%60,ea='AM';
  if(eh>=12){ea='PM';if(eh>12)eh-=12;}
  if(eh===0)eh=12;
  return{h:eh,m:em,ampm:ea};
}
function fmt12(h,m,ampm){return String(parseInt(h)||0).padStart(2,'0')+':'+String(parseInt(m)||0).padStart(2,'0')+' '+ampm;}
function timeRange(t){
  const h=parseInt(t.timeH)||0,m=parseInt(t.timeM)||0;
  if(!h&&!m&&!t.timeH)return '';
  const start=fmt12(h,m,t.ampm||'AM');
  const dh=parseInt(t.durH)||0,dm=parseInt(t.durM)||0;
  if(!dh&&!dm)return start;
  const end=addDur(h,m,t.ampm||'AM',dh,dm);
  return start+' – '+fmt12(end.h,end.m,end.ampm);
}
function pL(p){return p==='high'?'🔥 High Priority':p==='medium'?'📌 Medium Priority':p==='low'?'🧘 Low Priority':p;}
function priClass(p){return p==='high'?'pri-high':p==='medium'?'pri-med':'pri-low';}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escJ(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// ── MERGED TASKS (everyday + day tasks) ───────────────────────
function getMergedTasks(dateStr){
  const dayTasks=getCacheTasks(dateStr);
  const overrides=(cache[dateStr+'_overrides'])||{};
  const injected=everydayTasks.map(et=>{
    const ov=overrides[et.id];
    if(ov==='deleted')return null;
    return{...et,status:ov==='done'?'done':'todo',isEveryday:true};
  }).filter(Boolean);
  return[...injected,...dayTasks];
}

// ── RENDER PAGE ───────────────────────────────────────────────
function renderPage(){
  const parts=selectedDate.split('-');
  const selD=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  document.getElementById('date-title').textContent=MONTHS_SI[selD.getMonth()]+' '+selD.getDate()+', '+selD.getFullYear();
  document.getElementById('date-sub').textContent=DAYS_SI[selD.getDay()];
  document.getElementById('print-date-label').textContent=DAYS_SI[selD.getDay()]+', '+MONTHS_SI[selD.getMonth()]+' '+selD.getDate()+' '+selD.getFullYear();

  // auto-move high priority from previous day
  const yday=new Date(selD);yday.setDate(yday.getDate()-1);
  const ydayKey=dateKey(yday);
  const ydayTasks=getCacheTasks(ydayKey);
  let movedCount=0;
  const dayTasks=getCacheTasks(selectedDate);
  if(ydayTasks.length&&selectedDate!==ydayKey){
    const toMove=ydayTasks.filter(t=>t.priority==='high'&&t.status==='todo'&&!t.movedTo);
    toMove.forEach(t=>{
      if(!dayTasks.find(x=>x.movedFrom===t.id)){
        const copy={...t,id:String(Date.now()+Math.random()),status:'todo',movedFrom:t.id};
        delete copy.movedTo;
        dayTasks.push(copy);
        t.movedTo=selectedDate;
        sbUpsertTask(copy,selectedDate);
        sbUpsertTask(t,ydayKey);
        movedCount++;
      }
    });
    if(movedCount){setCacheTasks(selectedDate,dayTasks);}
  }
  const notice=document.getElementById('moved-notice');
  if(movedCount){notice.style.display='block';notice.textContent='⏩ '+movedCount+' High Priority කාර්ය(ය) ඊයේ සිට ස්වයංක්‍රීයව ගෙනා ලදී.';}
  else notice.style.display='none';

  const all=getMergedTasks(selectedDate);
  const sortByTime=arr=>arr.slice().sort((a,b)=>timeToMinutes(a.timeH,a.timeM,a.ampm)-timeToMinutes(b.timeH,b.timeM,b.ampm));
  const todoTasks=sortByTime(all.filter(t=>t.status!=='done'));
  const doneTasks=all.filter(t=>t.status==='done');

  renderAllTable('all-body',todoTasks);
  renderDoneTable('done-body',doneTasks);
  document.getElementById('done-count').textContent=doneTasks.length;
  document.getElementById('done-section').style.display=doneTasks.length?'':'none';
}

function renderAllTable(tbodyId,tasks){
  const tbody=document.getElementById(tbodyId);
  if(!tasks.length){tbody.innerHTML='<tr><td colspan="7" class="empty-msg">කාර්ය නොමැත</td></tr>';return;}
  tbody.innerHTML=tasks.map((t,i)=>{
    const tr=timeRange(t);
    const mvTag=t.movedFrom&&!t.isEveryday?'<span class="moved-tag">⏩ ගෙනා ලදී</span>':'';
    return`<tr>
      <td class="num-cell">${i+1}.</td>
      <td class="t-name">${escH(t.name)}${mvTag}</td>
      <td><span class="pri-badge ${priClass(t.priority)}">${pL(t.priority)}</span></td>
      <td>${tr?`<span class="time-range">${escH(tr)}</span>`:'<span style="color:var(--bdr)">—</span>'}</td>
      <td><span class="status-badge badge-todo">⏳ To do</span></td>
      <td style="color:var(--muted);font-size:11px;">${escH(t.notes||'')}</td>
      <td class="no-print"><div class="action-btns">
        <button class="action-btn btn-complete" title="සම්පූර්ණ කරන්න" onclick="completeTask('${escJ(t.id)}',${!!t.isEveryday})">✓</button>
        ${!t.isEveryday?`<button class="action-btn btn-move-next" title="ඊළඟ දවසට" onclick="moveToNextDay('${escJ(t.id)}')">→</button>`:''}
        <button class="action-btn btn-delete" title="මකන්න" onclick="askDelete('${escJ(t.id)}','${escJ(escH(t.name))}',${!!t.isEveryday})">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function renderDoneTable(tbodyId,tasks){
  const tbody=document.getElementById(tbodyId);
  if(!tasks.length){tbody.innerHTML='';return;}
  tbody.innerHTML=tasks.map((t,i)=>{
    const tr=timeRange(t);
    return`<tr class="done-row">
      <td class="num-cell">${i+1}.</td>
      <td class="t-name">${escH(t.name)}</td>
      <td><span class="pri-badge ${priClass(t.priority)}">${pL(t.priority)}</span></td>
      <td>${tr?`<span class="time-range">${escH(tr)}</span>`:'—'}</td>
      <td><span class="status-badge badge-done">✅ Done</span></td>
      <td style="color:var(--muted);font-size:11px;">${escH(t.notes||'')}</td>
      <td class="no-print"><div class="action-btns">
        <button class="action-btn btn-undo" title="Undo - නැවත To Do කරන්න" onclick="undoTask('${escJ(t.id)}',${!!t.isEveryday})">↩</button>
        <button class="action-btn btn-delete" title="මකන්න" onclick="askDelete('${escJ(t.id)}','${escJ(escH(t.name))}',${!!t.isEveryday})">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── TASK ACTIONS ──────────────────────────────────────────────
async function addTask(){
  const name=document.getElementById('task-name').value.trim();
  if(!name){alert('කාර්යය ලියන්න!');return;}
  const task={
    id:String(Date.now()),name,
    priority:document.getElementById('task-priority').value,
    timeH:document.getElementById('task-hour').value||'',
    timeM:document.getElementById('task-min').value||'',
    ampm:document.getElementById('task-ampm').value,
    durH:document.getElementById('task-dur-h').value||'0',
    durM:document.getElementById('task-dur-m').value||'0',
    notes:document.getElementById('task-notes').value.trim(),
    status:'todo',created:selectedDate
  };
  const everyday=document.getElementById('task-everyday').checked;
  if(everyday){
    everydayTasks.push(task);saveEveryday();
  } else {
    const tasks=getCacheTasks(selectedDate);
    tasks.push(task);
    setCacheTasks(selectedDate,tasks);
    await sbUpsertTask(task,selectedDate);
  }
  ['task-name','task-notes','task-dur-h','task-dur-m','task-hour','task-min'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('task-everyday').checked=false;
  renderPage();renderStrip();
  if(everyday)showToast('හැම දවසටම task එකතු කළා 🔁');
}

async function completeTask(id,isEveryday){
  if(isEveryday){
    const ov=cache[selectedDate+'_overrides']||{};
    ov[id]='done';
    cache[selectedDate+'_overrides']=ov;
  } else {
    const tasks=getCacheTasks(selectedDate);
    const t=tasks.find(x=>x.id===id);
    if(t){t.status='done';await sbUpsertTask(t,selectedDate);}
  }
  renderPage();
}

async function undoTask(id,isEveryday){
  if(isEveryday){
    const ov=cache[selectedDate+'_overrides']||{};
    delete ov[id];
    cache[selectedDate+'_overrides']=ov;
  } else {
    const tasks=getCacheTasks(selectedDate);
    const t=tasks.find(x=>x.id===id);
    if(t){t.status='todo';await sbUpsertTask(t,selectedDate);}
  }
  showToast('කාර්යය නැවත "To Do" ලැයිස්තුවට ගෙනා ✓');
  renderPage();
}

async function moveToNextDay(id){
  const tasks=getCacheTasks(selectedDate);
  const idx=tasks.findIndex(x=>x.id===id);if(idx===-1)return;
  const t=tasks[idx];
  const parts=selectedDate.split('-');
  const nxt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  nxt.setDate(nxt.getDate()+1);
  const nk=dateKey(nxt);
  const nxtTasks=getCacheTasks(nk);
  if(!nxtTasks.find(x=>x.movedFrom===t.id)){
    const copy={...t,id:String(Date.now()+Math.random()),status:'todo',movedFrom:t.id};
    delete copy.movedTo;
    nxtTasks.push(copy);
    setCacheTasks(nk,nxtTasks);
    await sbUpsertTask(copy,nk);
  }
  t.movedTo=nk;
  tasks.splice(idx,1);
  setCacheTasks(selectedDate,tasks);
  await sbUpsertTask(t,selectedDate);
  renderPage();renderStrip();showToast('ඊළඟ දවසට ගෙන යන ලදී ✓');
}

function askDelete(id,name,isEveryday){
  pendingDeleteId=id;pendingDeleteEveryday=isEveryday;
  document.getElementById('modal-task-name').textContent=name;
  document.getElementById('delete-modal').classList.add('active');
}
function closeModal(){pendingDeleteId=null;document.getElementById('delete-modal').classList.remove('active');}
async function confirmDelete(){
  if(!pendingDeleteId)return;
  if(pendingDeleteEveryday){
    everydayTasks=everydayTasks.filter(x=>x.id!==pendingDeleteId);saveEveryday();
  } else {
    const tasks=getCacheTasks(selectedDate);
    setCacheTasks(selectedDate,tasks.filter(x=>x.id!==pendingDeleteId));
    await sbDeleteTask(pendingDeleteId);
  }
  closeModal();renderPage();renderStrip();
}
document.getElementById('delete-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},2500);}
function doPrint(){window.print();}

document.getElementById('task-name').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});

// ── INIT: create table if not exists, then load ───────────────
async function init(){
  // ensure table exists via REST (will fail silently if already exists)
  try{
    // load today
    await sbLoadDate(selectedDate);
  }catch(e){console.warn(e);}
  renderStrip();
  renderPage();
  setTimeout(()=>{const s=document.querySelector('#day-strip .selected');if(s)s.scrollIntoView({inline:'center',behavior:'smooth'});},120);
}

init();
</script>
